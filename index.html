<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バレーボール ボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f3f4f6;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
      color: #1f2937;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .layout { display: flex; flex-direction: column; gap: 20px; }
    .sidebar { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .sidebar.hidden { display: none; }
    .court-area {
      width: 100%; background: #fff; border-radius: 12px; padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
      display: flex; flex-direction: column; align-items: center;
    }
    @media (min-width: 768px) {
      .layout { flex-direction: row; align-items: flex-start; }
      .sidebar { width: 34%; }
      .court-area { width: 66%; }
      .court-area.full { width: 100%; }
      #toggle-sidebar-btn { width: auto; }
    }
    .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    h1 { font-size: 20px; font-weight: 700; color: #4338ca; }
    .subtitle { font-size: 13px; color: #6b7280; margin-top: 6px; line-height: 1.6; }
    .autosave { color: #4f46e5; font-weight: 600; }
    h2 { font-size: 15px; font-weight: 600; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 12px; }
    button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; font-weight: 700; }
    #toggle-sidebar-btn {
      width: 100%; background: #4f46e5; color: #fff; padding: 10px 16px; font-size: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.15); margin-bottom: 16px;
    }
    #toggle-sidebar-btn:active { background: #4338ca; }
    #scene-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
    .scene-btn {
      text-align: left; padding: 10px 12px; font-size: 14px; font-weight: 500;
      background: #f3f4f6; color: #374151; border-radius: 8px;
    }
    .scene-btn.active { background: #4f46e5; color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    #add-scene-btn {
      margin-top: 8px; width: 100%; padding: 10px; background: #eef2ff; color: #4338ca;
      font-size: 13px; border: 1px solid #c7d2fe;
    }
    #rotate-btn {
      width: 100%; padding: 14px; background: #f97316; color: #fff; font-size: 15px;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #rotate-btn:active { background: #ea580c; }
    #rotate-btn svg { width: 20px; height: 20px; }
    .hint { font-size: 11px; color: #6b7280; text-align: center; margin-top: 8px; }
    #reset-btn {
      width: 100%; margin-top: 10px; padding: 10px; background: #f3f4f6; color: #4b5563;
      font-size: 13px; border: 1px solid #e5e7eb;
    }
    #reset-btn.armed { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    #rotation-status {
      text-align: center; font-size: 13px; font-weight: 700; color: #4338ca;
      background: #eef2ff; border-radius: 8px; padding: 6px; margin-bottom: 10px;
    }
    #save-base-btn {
      width: 100%; margin-top: 10px; padding: 10px; background: #eef2ff; color: #4338ca;
      font-size: 13px; border: 1px solid #c7d2fe;
    }
    #reset-pos-btn {
      width: 100%; margin-top: 8px; padding: 10px; background: #fff7ed; color: #c2410c;
      font-size: 13px; border: 1px solid #fed7aa;
    }
    #player-inputs-container { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .player-row { display: flex; align-items: center; gap: 8px; }
    .player-badge {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
    }
    .player-row input {
      flex-grow: 1; min-width: 0; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: 8px; font-size: 14px; font-family: inherit;
    }
    .player-row input:focus { outline: none; border-color: #6366f1; }
    #scene-name-input {
      width: 100%; max-width: 512px; text-align: center; font-size: 17px; font-weight: 700;
      background: #f9fafb; border: 1px solid transparent; border-radius: 6px;
      padding: 8px; margin-bottom: 16px; font-family: inherit;
    }
    #scene-name-input:focus { outline: none; border-color: #6366f1; background: #fff; }
    #view-toggle { display: flex; gap: 4px; background: #f3f4f6; padding: 4px; border-radius: 10px; margin-bottom: 16px; }
    .view-btn { padding: 8px 18px; font-size: 13px; font-weight: 600; background: transparent; color: #6b7280; border-radius: 8px; }
    .view-btn.active { background: #fff; color: #4338ca; box-shadow: 0 1px 2px rgba(0,0,0,.12); }
    #court {
      position: relative; width: 100%; max-width: 340px; aspect-ratio: 1 / 2;
      background: #fdba74; border: 4px solid #fff; margin: 0 auto; overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,.15);
    }
    @supports not (aspect-ratio: 1 / 2) { #court { height: 640px; } }
    /* 自コートのみ表示（横長・拡大） */
    #court.half { max-width: 620px; aspect-ratio: 3 / 2; }
    @supports not (aspect-ratio: 1 / 2) { #court.half { height: 420px; } }
    #court.half .opp-zone, #court.half .center-line, #court.half .line-opp, #court.half .zone-label.top { display: none; }
    #court.half .net-line { top: 0; margin-top: 0; }
    #court.half .line-own { top: 33.33%; }
    #court.half .marker { width: 56px; height: 56px; margin-left: -28px; margin-top: -28px; font-size: 16px; }
    #court.half .marker.ball { width: 40px; height: 40px; margin-left: -20px; margin-top: -20px; font-size: 24px; }
    .line { position: absolute; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,.7); }
    .line-own { top: 66.66%; }
    .opp-zone { position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: rgba(0,0,0,.05); pointer-events: none; }
    .center-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #fff; margin-top: -1px; }
    .net-line { position: absolute; top: 50%; left: -2%; width: 104%; border-top: 4px dashed rgba(75,85,99,.5); margin-top: -2px; }
    .zone-label { position: absolute; font-size: 11px; font-weight: 700; pointer-events: none; }
    .zone-label.top { top: 8px; left: 8px; color: rgba(75,85,99,.55); }
    .zone-label.bottom { bottom: 8px; left: 8px; color: rgba(255,255,255,.7); }
    #markers-container { position: absolute; inset: 0; z-index: 10; }
    .marker {
      position: absolute; width: 44px; height: 44px; margin-left: -22px; margin-top: -22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; cursor: grab; z-index: 10;
      touch-action: none; transition: transform .1s;
    }
    .marker.dragging { transform: scale(1.1); z-index: 20; opacity: .85; cursor: grabbing; }
    .marker.ball {
      width: 34px; height: 34px; margin-left: -17px; margin-top: -17px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); font-size: 19px;
    }
    .c-red { background: #ef4444; } .c-blue { background: #3b82f6; } .c-green { background: #22c55e; }
    .c-yellow { background: #eab308; } .c-purple { background: #a855f7; } .c-pink { background: #ec4899; }
    .c-gray { background: #4b5563; }
    #edit-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
      align-items: center; justify-content: center; z-index: 50; padding: 16px;
    }
    #edit-modal.open { display: flex; }
    .modal-box { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.2); width: 100%; max-width: 320px; }
    .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    #modal-name-input {
      width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px 12px;
      margin-bottom: 16px; font-size: 15px; font-family: inherit;
    }
    #modal-name-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.3); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #modal-cancel-btn { padding: 10px 16px; background: #f3f4f6; color: #4b5563; font-size: 14px; }
    #modal-save-btn { padding: 10px 16px; background: #4f46e5; color: #fff; font-size: 14px; }
    /* フォーメーション行（名前ボタン＋削除ボタン） */
    .scene-item { display: flex; align-items: center; gap: 6px; }
    .scene-item .scene-btn { flex: 1; min-width: 0; }
    .scene-del-btn {
      flex-shrink: 0; width: 34px; height: 38px; background: #f3f4f6; color: #9ca3af;
      border-radius: 8px; font-size: 15px; display: flex; align-items: center; justify-content: center;
    }
    .scene-del-btn:active { background: #fee2e2; color: #b91c1c; }
    /* 基本ローテのミニ参考表示 */
    #mini-court-wrap { margin-top: 16px; display: none; flex-direction: column; align-items: center; }
    #mini-court-wrap.show { display: flex; }
    .mini-label { font-size: 11px; font-weight: 700; color: #6b7280; margin-bottom: 6px; }
    #mini-court {
      position: relative; width: 168px; aspect-ratio: 3 / 2; background: #fdba74;
      border: 3px solid #fff; border-radius: 4px; overflow: hidden;
      box-shadow: inset 0 1px 4px rgba(0,0,0,.15);
    }
    @supports not (aspect-ratio: 3 / 2) { #mini-court { height: 112px; } }
    #mini-court .mini-net { position: absolute; top: 33.33%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,.7); }
    #mini-markers { position: absolute; inset: 0; }
    .mini-marker {
      position: absolute; width: 22px; height: 22px; margin-left: -11px; margin-top: -11px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: #fff; line-height: 1; overflow: hidden;
    }
  </style>
</head>
<body>

  <button id="toggle-sidebar-btn">◀ メニューを隠す</button>

  <div class="layout">
    <!-- 左側：コントロールパネル -->
    <div id="sidebar" class="sidebar">
      <div class="card">
        <h1>🏐 バレーボール ボード</h1>
        <p class="subtitle">
          ドラッグで移動、選手タップで名前変更<br>
          <span class="autosave">💾 変更は自動保存されます</span>
        </p>
      </div>

      <div class="card">
        <h2>フォーメーション選択</h2>
        <div id="scene-list"></div>
        <button id="add-scene-btn">+ 現在の配置を新規シーンとして追加</button>
      </div>

      <div class="card">
        <h2>アクション</h2>
        <p id="rotation-status">現在: ローテ 1/6</p>
        <button id="rotate-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
          </svg>
          ローテーション実行
        </button>
        <p class="hint">※次のローテへ進みます（記録済みの配置があればそれを表示）</p>
        <button id="save-base-btn">📍 現在の配置をこのローテに記録</button>
        <button id="reset-pos-btn">↩️ 記録した配置に戻す</button>
        <button id="reset-btn">🗑 保存データをリセット</button>
      </div>

      <div class="card">
        <h2>選手名 / ポジション設定</h2>
        <div id="player-inputs-container"></div>
      </div>
    </div>

    <!-- 右側：コート表示エリア -->
    <div id="court-container" class="court-area">
      <input id="scene-name-input" type="text" title="シーン名を変更">
      <div id="view-toggle">
        <button id="view-full-btn" class="view-btn active">🏟 フルコート</button>
        <button id="view-half-btn" class="view-btn">🔍 自コートのみ</button>
      </div>
      <div id="court">
        <div class="opp-zone"></div>
        <div class="line line-opp" style="top: 33.33%;"></div>
        <div class="center-line"></div>
        <div class="net-line"></div>
        <div class="line line-own"></div>
        <div id="markers-container"></div>
        <div class="zone-label top">相手コート</div>
        <div class="zone-label bottom">自コート</div>
      </div>
      <div id="mini-court-wrap">
        <div class="mini-label">基本ローテ</div>
        <div id="mini-court">
          <div class="mini-net"></div>
          <div id="mini-markers"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 選手名編集モーダル -->
  <div id="edit-modal">
    <div class="modal-box">
      <h3>名前 / ポジション変更</h3>
      <input id="modal-name-input" type="text" placeholder="例: S, WS, 田中">
      <div class="modal-actions">
        <button id="modal-cancel-btn">キャンセル</button>
        <button id="modal-save-btn">保存</button>
      </div>
    </div>
  </div>

  <script>
    // --- データ定義 ---
    let entities = [
      { id: '1', name: '1', color: 'c-red', type: 'ally' },
      { id: '2', name: '2', color: 'c-blue', type: 'ally' },
      { id: '3', name: '3', color: 'c-green', type: 'ally' },
      { id: '4', name: '4', color: 'c-yellow', type: 'ally' },
      { id: '5', name: '5', color: 'c-purple', type: 'ally' },
      { id: '6', name: '6', color: 'c-pink', type: 'ally' },
      { id: 'o1', name: 'A', color: 'c-gray', type: 'opponent' },
      { id: 'o2', name: 'B', color: 'c-gray', type: 'opponent' },
      { id: 'o3', name: 'C', color: 'c-gray', type: 'opponent' },
      { id: 'o4', name: 'D', color: 'c-gray', type: 'opponent' },
      { id: 'o5', name: 'E', color: 'c-gray', type: 'opponent' },
      { id: 'o6', name: 'F', color: 'c-gray', type: 'opponent' },
      { id: 'ball', name: '🏐', color: '', type: 'ball' },
    ];

    const defaultPositions = {
      '1': { x: 80, y: 90 }, '2': { x: 80, y: 60 }, '3': { x: 50, y: 60 },
      '4': { x: 20, y: 60 }, '5': { x: 20, y: 90 }, '6': { x: 50, y: 90 },
      'o1': { x: 20, y: 10 }, 'o2': { x: 20, y: 40 }, 'o3': { x: 50, y: 40 },
      'o4': { x: 80, y: 40 }, 'o5': { x: 80, y: 10 }, 'o6': { x: 50, y: 10 },
      'ball': { x: 50, y: 50 },
    };

    // シーン生成（各シーンはローテ番号とローテごとの記録配置を持つ）
    function makeScene(id, name, positions) {
      const pos = JSON.parse(JSON.stringify(positions));
      return {
        id,
        name,
        positions: pos,
        rotIndex: 1,
        rotSlots: { 1: JSON.parse(JSON.stringify(pos)) }
      };
    }

    // 初期配置はすべて基本ローテと同じ
    let scenes = [
      makeScene('s1', '基本ローテ', defaultPositions),
      makeScene('s7', 'レセプション', defaultPositions),
      makeScene('s8', '対レフト攻撃', defaultPositions),
      makeScene('s9', '対センター攻撃', defaultPositions),
      makeScene('s10', '対ライト攻撃', defaultPositions),
    ];

    // --- 各種状態の管理 ---
    let activeSceneId = scenes[0].id;
    let draggingPlayerId = null;
    let editingPlayerId = null;
    let isSidebarOpen = true;
    let viewMode = 'full'; // 'full' | 'half'

    // --- localStorage 永続化 ---
    const STORAGE_KEY = 'volleyballBoardState_v3';

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          names: entities.map(e => ({ id: e.id, name: e.name })),
          scenes,
          activeSceneId,
          viewMode
        }));
      } catch (e) {
        // 保存できない環境（プライベートモード等）では無視
      }
    }

    function loadState() {
      try {
        let raw = localStorage.getItem(STORAGE_KEY);
        // 旧バージョン(v1)の保存データも引き継ぐ
        if (!raw) {
          const old = localStorage.getItem('volleyballBoardState_v1');
          if (old) {
            const oldData = JSON.parse(old);
            raw = JSON.stringify({
              names: (oldData.entities || []).map(e => ({ id: e.id, name: e.name })),
              scenes: oldData.scenes,
              activeSceneId: oldData.activeSceneId
            });
          }
        }
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Array.isArray(data.names)) {
          data.names.forEach(saved => {
            const ent = entities.find(e => e.id === saved.id);
            if (ent && saved.name) ent.name = saved.name;
          });
        }
        if (Array.isArray(data.scenes) && data.scenes.length > 0) {
          scenes = data.scenes;
          // 旧データの移行：ローテ番号・記録配置がないシーンに初期値を付与
          scenes.forEach(s => {
            if (!s.rotIndex) s.rotIndex = 1;
            if (!s.rotSlots) s.rotSlots = { [s.rotIndex]: JSON.parse(JSON.stringify(s.positions)) };
          });
        }
        if (data.activeSceneId && scenes.some(s => s.id === data.activeSceneId)) {
          activeSceneId = data.activeSceneId;
        } else {
          activeSceneId = scenes[0].id;
        }
        if (data.viewMode === 'half' || data.viewMode === 'full') viewMode = data.viewMode;
      } catch (e) {
        // 読み込み失敗時は初期データで起動
      }
    }

    // --- DOM要素の取得 ---
    const sidebar = document.getElementById('sidebar');
    const courtContainer = document.getElementById('court-container');
    const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
    const sceneList = document.getElementById('scene-list');
    const addSceneBtn = document.getElementById('add-scene-btn');
    const rotateBtn = document.getElementById('rotate-btn');
    const playerInputsContainer = document.getElementById('player-inputs-container');
    const sceneNameInput = document.getElementById('scene-name-input');
    const court = document.getElementById('court');
    const markersContainer = document.getElementById('markers-container');
    const editModal = document.getElementById('edit-modal');
    const modalNameInput = document.getElementById('modal-name-input');
    const modalCancelBtn = document.getElementById('modal-cancel-btn');
    const modalSaveBtn = document.getElementById('modal-save-btn');
    const miniCourtWrap = document.getElementById('mini-court-wrap');
    const miniMarkers = document.getElementById('mini-markers');
    const miniLabel = miniCourtWrap.querySelector('.mini-label');

    // --- 関数群 ---

    function getActiveScene() {
      return scenes.find(s => s.id === activeSceneId) || scenes[0];
    }

    // 基本ローテ（先頭シーン）を基準として扱う
    function getBaseScene() {
      return scenes[0];
    }

    // 指定ローテ番号の基本ローテ配置を取得（記録がなければローテ1から算出）
    function basePositionsForRot(rotIndex) {
      const base = getBaseScene();
      if (base.rotSlots && base.rotSlots[rotIndex]) {
        return base.rotSlots[rotIndex];
      }
      const start = (base.rotSlots && base.rotSlots[1]) ? base.rotSlots[1] : base.positions;
      const p = JSON.parse(JSON.stringify(start));
      for (let i = 1; i < rotIndex; i++) rotateClockwise(p);
      return p;
    }

    // フォーメーション（シーン）を削除
    function deleteScene(id) {
      const idx = scenes.findIndex(s => s.id === id);
      if (idx <= 0) return; // 基本ローテは削除不可
      if (!confirm('「' + scenes[idx].name + '」を削除し��すか？')) return;
      scenes.splice(idx, 1);
      if (activeSceneId === id) activeSceneId = scenes[0].id;
      render();
      saveState();
    }

    // 基本ローテのミニ参考表示（基本ローテ以外のシーンでのみ表示）
    function renderMiniCourt() {
      const activeScene = getActiveScene();
      if (activeScene.id === getBaseScene().id) {
        miniCourtWrap.classList.remove('show');
        return;
      }
      miniCourtWrap.classList.add('show');
      miniLabel.innerText = '基本ローテ ' + activeScene.rotIndex + '/6';
      const pos = basePositionsForRot(activeScene.rotIndex);
      miniMarkers.innerHTML = '';
      entities.filter(e => e.type === 'ally').forEach(entity => {
        const p = pos[entity.id];
        if (!p || p.y < 50) return; // 自コートのみ表示
        const m = document.createElement('div');
        m.className = 'mini-marker ' + entity.color;
        m.style.left = p.x + '%';
        m.style.top = ((p.y - 50) * 2) + '%';
        m.innerText = entity.name;
        miniMarkers.appendChild(m);
      });
    }

    // 表示モードに応じた座標変換（half: 自コート下半分を全面に拡大）
    function displayPos(pos) {
      if (viewMode === 'half') return { x: pos.x, y: (pos.y - 50) * 2 };
      return pos;
    }

    function render() {
      const activeScene = getActiveScene();

      sceneNameInput.value = activeScene.name;

      // シーンリストの描画
      sceneList.innerHTML = '';
      scenes.forEach((scene, idx) => {
        const item = document.createElement('div');
        item.className = 'scene-item';
        const btn = document.createElement('button');
        btn.innerText = scene.name;
        btn.className = 'scene-btn' + (activeSceneId === scene.id ? ' active' : '');
        btn.onclick = () => {
          activeSceneId = scene.id;
          render();
          saveState();
        };
        item.appendChild(btn);
        // 基本ローテ（先頭シーン）は基準のため削除不可
        if (idx !== 0) {
          const del = document.createElement('button');
          del.className = 'scene-del-btn';
          del.innerText = '🗑';
          del.title = 'このフォーメーションを削除';
          del.onclick = (e) => { e.stopPropagation(); deleteScene(scene.id); };
          item.appendChild(del);
        }
        sceneList.appendChild(item);
      });

      // 選手名入力フォームの描画
      playerInputsContainer.innerHTML = '';
      entities.filter(e => e.type === 'ally').forEach(player => {
        const wrapper = document.createElement('div');
        wrapper.className = 'player-row';
        const badge = document.createElement('div');
        badge.className = 'player-badge ' + player.color;
        badge.innerText = player.id;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = player.name;
        input.placeholder = '選手 ' + player.id;
        input.oninput = (e) => {
          player.name = e.target.value || player.id.toString();
          updateMarkersText();
          saveState();
        };
        wrapper.appendChild(badge);
        wrapper.appendChild(input);
        playerInputsContainer.appendChild(wrapper);
      });

      renderMarkers();
      updateRotationStatus();
    }

    function renderMarkers() {
      markersContainer.innerHTML = '';
      const activeScene = getActiveScene();

      entities.forEach(entity => {
        const pos = activeScene.positions[entity.id];
        if (!pos) return;

        // 自コートのみ表示：相手チームと相手コート側のマーカーは描画しない
        if (viewMode === 'half') {
          if (entity.type === 'opponent') return;
          if (pos.y < 50) return;
        }

        const isBall = entity.type === 'ball';
        const dp = displayPos(pos);
        const marker = document.createElement('div');
        marker.id = 'marker-' + entity.id;
        marker.className = 'marker ' + entity.color + (isBall ? ' ball' : '');
        marker.style.left = dp.x + '%';
        marker.style.top = dp.y + '%';
        marker.innerText = entity.name;
        marker.setAttribute('title', isBall ? 'ドラッグで移動' : 'タップで名前変更 / ドラッグで移動');

        let moved = false;

        marker.onpointerdown = (e) => {
          e.preventDefault();
          moved = false;
          draggingPlayerId = entity.id;
          marker.classList.add('dragging');
          // iPad/タッチでもポインターを追跡し続ける
          try { marker.setPointerCapture(e.pointerId); } catch (err) {}
        };

        marker.onpointermove = (e) => {
          if (draggingPlayerId === entity.id) {
            moved = true;
            movePlayer(e.clientX, e.clientY);
          }
        };

        marker.onpointerup = () => {
          if (draggingPlayerId === entity.id) {
            marker.classList.remove('dragging');
            draggingPlayerId = null;
            saveState();
            // タップ（移動なし）なら名前変更モーダルを開く
            if (!moved && !isBall) {
              editingPlayerId = entity.id;
              modalNameInput.value = entity.name;
              editModal.classList.add('open');
              modalNameInput.focus();
            }
          }
        };

        marker.onpointercancel = () => {
          if (draggingPlayerId === entity.id) {
            marker.classList.remove('dragging');
            draggingPlayerId = null;
            saveState();
          }
        };

        markersContainer.appendChild(marker);
      });

      renderMiniCourt();
    }

    function updateMarkersText() {
      entities.forEach(entity => {
        const m = document.getElementById('marker-' + entity.id);
        if (m) m.innerText = entity.name;
      });
    }

    function movePlayer(clientX, clientY) {
      if (!draggingPlayerId) return;
      const activeScene = getActiveScene();
      const courtRect = court.getBoundingClientRect();

      let x = ((clientX - courtRect.left) / courtRect.width) * 100;
      let y = ((clientY - courtRect.top) / courtRect.height) * 100;

      x = Math.max(0, Math.min(100, x));
      y = Math.max(0, Math.min(100, y));

      // half表示中は見た目の座標を実座標（自コート下半分）に変換して保存
      let storedY = y;
      if (viewMode === 'half') storedY = 50 + y / 2;

      activeScene.positions[draggingPlayerId] = { x, y: storedY };

      const marker = document.getElementById('marker-' + draggingPlayerId);
      if (marker) {
        marker.style.left = x + '%';
        marker.style.top = y + '%';
      }
    }

    // --- イベントリスナー設定 ---

    toggleSidebarBtn.onclick = () => {
      isSidebarOpen = !isSidebarOpen;
      if (isSidebarOpen) {
        sidebar.classList.remove('hidden');
        courtContainer.classList.remove('full');
        toggleSidebarBtn.innerText = '◀ メニューを隠す';
      } else {
        sidebar.classList.add('hidden');
        courtContainer.classList.add('full');
        toggleSidebarBtn.innerText = '▶ メニューを表示';
      }
    };

    sceneNameInput.oninput = (e) => {
      const activeScene = getActiveScene();
      activeScene.name = e.target.value;
      // リスト側の名称のみ更新（フォーカスを失わないよう部分更新）
      const btns = sceneList.querySelectorAll('.scene-btn');
      scenes.forEach((s, i) => { if (btns[i]) btns[i].innerText = s.name; });
      saveState();
    };

    addSceneBtn.onclick = () => {
      const activeScene = getActiveScene();
      const newId = 's' + Date.now();
      const newScene = makeScene(newId, '新規シーン ' + (scenes.length + 1), activeScene.positions);
      scenes.push(newScene);
      activeSceneId = newId;
      render();
      saveState();
    };

    const rotationStatus = document.getElementById('rotation-status');
    const saveBaseBtn = document.getElementById('save-base-btn');
    const resetPosBtn = document.getElementById('reset-pos-btn');

    function updateRotationStatus() {
      const scene = getActiveScene();
      rotationStatus.innerText = '現在: ローテ ' + scene.rotIndex + '/6';
    }

    // 時計回りに1つ回す
    function rotateClockwise(p) {
      const tmp = { ...p['1'] };
      p['1'] = { ...p['6'] };
      p['6'] = { ...p['5'] };
      p['5'] = { ...p['4'] };
      p['4'] = { ...p['3'] };
      p['3'] = { ...p['2'] };
      p['2'] = tmp;
    }

    rotateBtn.onclick = () => {
      const scene = getActiveScene();
      // 次のローテ番号へ（1→2→...→6→1）
      scene.rotIndex = (scene.rotIndex % 6) + 1;

      if (scene.rotSlots[scene.rotIndex]) {
        // 記録済みの配置があればそれを表示
        scene.positions = JSON.parse(JSON.stringify(scene.rotSlots[scene.rotIndex]));
      } else {
        // なければ現在の配置を時計回りに回し、このローテの記録として保存
        rotateClockwise(scene.positions);
        scene.rotSlots[scene.rotIndex] = JSON.parse(JSON.stringify(scene.positions));
      }

      renderMarkers();
      updateRotationStatus();
      saveState();
    };

    // 現在の配置をこのローテの記録として保存
    saveBaseBtn.onclick = () => {
      const scene = getActiveScene();
      scene.rotSlots[scene.rotIndex] = JSON.parse(JSON.stringify(scene.positions));
      saveState();
      saveBaseBtn.innerText = '✅ ローテ ' + scene.rotIndex + ' に記録しました';
      setTimeout(() => {
        saveBaseBtn.innerText = '📍 現在の配置をこのローテに記録';
      }, 1500);
    };

    // 記録した配置に戻す（ドラッグで動かした分をリセット）
    resetPosBtn.onclick = () => {
      const scene = getActiveScene();
      const base = scene.rotSlots[scene.rotIndex];
      if (base) {
        scene.positions = JSON.parse(JSON.stringify(base));
        renderMarkers();
        saveState();
      }
    };

    function closeModal() {
      editModal.classList.remove('open');
      editingPlayerId = null;
    }

    modalCancelBtn.onclick = closeModal;

    modalSaveBtn.onclick = () => {
      if (editingPlayerId) {
        const player = entities.find(e => e.id === editingPlayerId);
        if (player) {
          player.name = modalNameInput.value || player.id.toString();
        }
        closeModal();
        render();
        saveState();
      }
    };

    modalNameInput.onkeydown = (e) => {
      if (e.key === 'Enter') {
        modalSaveBtn.click();
      }
    };

    // 保存データのリセット（誤操作防止の2段階タップ）
    const resetBtn = document.getElementById('reset-btn');
    let resetArmed = false;
    let resetTimer = null;
    resetBtn.onclick = () => {
      if (!resetArmed) {
        resetArmed = true;
        resetBtn.innerText = '⚠️ もう一度タップで初期状態に戻す';
        resetBtn.classList.add('armed');
        resetTimer = setTimeout(() => {
          resetArmed = false;
          resetBtn.innerText = '🗑 保存データをリセット';
          resetBtn.classList.remove('armed');
        }, 3000);
      } else {
        clearTimeout(resetTimer);
        try {
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem('volleyballBoardState_v2');
          localStorage.removeItem('volleyballBoardState_v1');
        } catch (e) {}
        location.reload();
      }
    };

    // 表示モード切替（フルコート / 自コートのみ）
    const viewFullBtn = document.getElementById('view-full-btn');
    const viewHalfBtn = document.getElementById('view-half-btn');
    function applyViewMode() {
      const half = viewMode === 'half';
      court.classList.toggle('half', half);
      viewHalfBtn.classList.toggle('active', half);
      viewFullBtn.classList.toggle('active', !half);
      renderMarkers();
    }
    viewFullBtn.onclick = () => { viewMode = 'full'; applyViewMode(); saveState(); };
    viewHalfBtn.onclick = () => { viewMode = 'half'; applyViewMode(); saveState(); };

    // 初期起動
    loadState();
    render();
    applyViewMode();
  </script>
</body>
</html>
